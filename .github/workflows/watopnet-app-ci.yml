# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions


name: GitHub Actions for Watopnet
on:
  push:
    branches:
      - 'main'
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  test:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-15, ubuntu-latest ]

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Setup SSH Key
        uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387 # v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Set up Python 3.12.6
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.12.6

      - name: Install libsodium (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libsodium
          echo "DYLD_LIBRARY_PATH=$(brew --prefix libsodium)/lib:$DYLD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Check disk space before install
        run: df -h

      - name: Install dependencies
        env:
          HKSVC_PULL_TOKEN: ${{ secrets.HKSVC_PULL_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir flake8 pytest coverage
          if [ -f requirements-dev.txt ]; then pip install --no-cache-dir -r requirements-dev.txt; fi

      - name: Check disk space after install
        if: always()
        run: df -h
      - name: Lint changes
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exit-zero --ignore=E7,F841,E301,E302,E303 --max-complexity=10 --max-line-length=127 --statistics
      - name: Run core KERI tests
        run: |
          pytest tests/watopnet --ignore test/scripts

  molecule-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Detect Molecule-relevant changes
        id: detect
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          base_sha="$BASE_SHA"
          if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
            base_sha="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
          fi
          changed_files="$(git diff --name-only "$base_sha" "$HEAD_SHA")"
          printf 'Changed files for Molecule gate:\n%s\n' "$changed_files"
          if printf '%s\n' "$changed_files" | grep -Eq '^(ansible/|src/|Makefile$|pyproject\.toml$|README\.md$|\.github/workflows/watopnet-app-ci\.yml$)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Setup SSH Key
        uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387 # v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Set up Python 3.12.6
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.12.6

      - name: Check disk space before install
        run: df -h

      - name: Install dependencies
        env:
          HKSVC_PULL_TOKEN: ${{ secrets.HKSVC_PULL_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir pytest pytest-cov
          if [ -f requirements-dev.txt ]; then pip install --no-cache-dir -r requirements-dev.txt; fi

      - name: Check disk space after install
        if: always()
        run: df -h
      - name: Run core KERI tests
        run: |
          pytest tests/watopnet --cov=./ --cov-report=xml
      - name: Upload
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  molecule:
    runs-on: ubuntu-latest
    needs:
      - test
      - coverage
      - molecule-changes
    if: needs.molecule-changes.outputs.changed == 'true'
    permissions:
      contents: read
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Install Molecule dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r ansible/roles/watcher_host/molecule/requirements.txt

      - name: Show Docker daemon info
        run: docker info

      - name: Run watcher Molecule scenario
        run: make molecule-test